<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Elective Reviews | Campus Compass</title>
    <link rel="stylesheet" href="./styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  </head>
  <body>
    <div class="app-shell tool-page">
      <header class="topbar">
        <a class="brand" href="./index.html?view=portal" aria-label="Campus Compass main page">
          <span class="brand-mark" aria-hidden="true">CC</span>
          <span>
            <strong>Campus Compass</strong>
            <small>Elective Reviews</small>
          </span>
        </a>

        <nav class="topnav" aria-label="Tool navigation">
          <a href="./index.html?view=portal">Main Page</a>
          <a class="is-current" href="./electives.html">Electives</a>
          <a href="./cgpa.html">CGPA</a>
          <a href="./placements.html">Placements</a>
          <a href="./departments.html">Department Resources</a>
          <a href="./events.html">Events</a>
        </nav>
      </header>

      <main class="tool-page-main">
        <article class="feature-panel is-visible">
          <div class="panel-header">
            <div>
              <p class="eyebrow">Elective reviews</p>
              <h1>Find courses by workload, grading, and teaching style.</h1>
            </div>
            <button class="ghost-button" id="addReviewBtn" type="button">Add Review</button>
          </div>

          <div class="review-layout">
            <aside class="filters" aria-label="Elective filters">
              <label>
                Course name or ID
                <input
                  id="courseSearch"
                  type="search"
                  list="courseSuggestions"
                  placeholder="Search HS5708, economics..."
                  autocomplete="off"
                />
              </label>
              <datalist id="courseSuggestions"></datalist>
              <p class="result-count" id="reviewCount" aria-live="polite">0 courses found</p>
            </aside>

            <div class="review-list" id="reviewList"></div>
          </div>
        </article>
      </main>
    </div>

    <!-- Add Review Modal -->
    <div class="modal-overlay" id="reviewModal">
      <div class="modal-container">
        <header class="modal-header">
          <h2>Add Elective Review</h2>
          <button class="modal-close" type="button" aria-label="Close modal">×</button>
        </header>
        <main class="modal-body">
          <form id="reviewForm">
            <label>
              Course Name
              <input type="text" id="modalCourse" placeholder="e.g. Econometrics-1" required />
            </label>
            <label>
              Course ID (Optional)
              <input type="text" id="modalCourseId" placeholder="e.g. HS5708" />
            </label>
            <label>
              Professor Name (Optional)
              <input type="text" id="modalProfessor" placeholder="e.g. Sabuj Kumar Mandal" />
            </label>
            <label>
              Review Description
              <textarea id="modalReview" rows="4" placeholder="Write your review here..." required style="width: 100%; border-radius: 8px; background: rgba(8, 9, 8, 0.72); border: 1px solid rgba(244, 240, 232, 0.13); color: var(--ink); padding: 10px; font-family: inherit; resize: vertical;"></textarea>
            </label>
          </form>
        </main>
        <footer class="modal-footer">
          <button class="ghost-button secondary modal-cancel" type="button">Cancel</button>
          <button class="primary-button" form="reviewForm" type="submit">Submit Review</button>
        </footer>
      </div>
    </div>

    <script src="./app-v2.js"></script>
  </body>
</html>

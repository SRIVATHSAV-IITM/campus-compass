<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Elective Reviews | Campus Compass</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell tool-page">
      <header class="topbar">
        <a class="brand" href="./index.html?view=portal" aria-label="Campus Compass main page">
          <span class="brand-mark" aria-hidden="true">CC</span>
          <span>
            <strong>Campus Compass</strong>
            <small>Elective Reviews</small>
          </span>
        </a>

        <nav class="topnav" aria-label="Tool navigation">
          <a href="./index.html?view=portal">Main Page</a>
          <a class="is-current" href="./electives.html">Electives</a>
          <a href="./cgpa.html">CGPA</a>
          <a href="./placements.html">Placements</a>
          <a href="./events.html">Events</a>
        </nav>
      </header>

      <main class="tool-page-main">
        <article class="feature-panel is-visible">
          <div class="panel-header">
            <div>
              <p class="eyebrow">Elective reviews</p>
              <h1>Find courses by workload, grading, and teaching style.</h1>
            </div>
            <button class="ghost-button" type="button">Add Review</button>
          </div>

          <div class="review-layout">
            <aside class="filters" aria-label="Elective filters">
              <label>
                Course name or ID
                <input
                  id="courseSearch"
                  type="search"
                  list="courseSuggestions"
                  placeholder="Search HS5708, economics..."
                  autocomplete="off"
                />
              </label>
              <datalist id="courseSuggestions"></datalist>
              <p class="result-count" id="reviewCount" aria-live="polite">11 courses found</p>
            </aside>

            <div class="review-list" id="reviewList"></div>
          </div>
        </article>
      </main>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
